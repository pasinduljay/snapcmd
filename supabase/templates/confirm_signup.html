<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; max-width: 480px; margin: 0 auto; padding: 40px 24px; background-color: #ffffff;">
  <div style="text-align: center; margin-bottom: 4px;">
    <span style="font-size: 22px; font-weight: 700; color: #171717;">
      Snap<span style="font-family: 'Courier New', Courier, monospace; color: #1BA672;">cmd</span>
    </span>
  </div>
  <p style="text-align: center; color: #737373; font-size: 13px; margin: 0 0 32px;">
    Your commands, one search away
  </p>

  <div style="border: 1px solid #e5e5e5; border-radius: 12px; padding: 32px 24px; text-align: center;">
    <h1 style="font-size: 18px; margin: 0 0 12px; color: #171717;">Confirm your email</h1>
    <p style="font-size: 14px; color: #525252; line-height: 1.6; margin: 0 0 24px;">
      Click the button below to confirm <strong>{{ .Email }}</strong> and start using Snapcmd.
    </p>
    <a href="{{ .ConfirmationURL }}"
       style="display: inline-block; background-color: #1BA672; color: #ffffff; font-size: 14px; font-weight: 600; text-decoration: none; padding: 12px 28px; border-radius: 8px;">
      Confirm email
    </a>
    <p style="font-size: 12px; color: #a3a3a3; margin: 20px 0 0; word-break: break-all;">
      Or paste this link into your browser:<br />
      <a href="{{ .ConfirmationURL }}" style="color: #1BA672;">{{ .ConfirmationURL }}</a>
    </p>
  </div>

  <p style="text-align: center; color: #a3a3a3; font-size: 12px; margin-top: 24px;">
    If you didn't create this account, you can safely ignore this email.
  </p>
</div>
