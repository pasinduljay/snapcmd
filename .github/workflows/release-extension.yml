name: Release extension

on:
  push:
    branches: [main]
    paths:
      - "extension/package.json"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./extension/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if this version was already released
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build extension
        if: steps.check.outputs.exists == 'false'
        working-directory: extension
        run: |
          npm ci
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          npm run build

      - name: Zip build
        if: steps.check.outputs.exists == 'false'
        run: |
          cd extension/dist
          zip -r "../../snapcmd-extension-v${{ steps.version.outputs.version }}.zip" .

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: snapcmd-extension-v${{ steps.version.outputs.version }}.zip
