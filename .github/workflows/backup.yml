name: Backup database to R2

on:
  schedule:
    # 03:00 UTC daily — adjust to taste
    - cron: "0 3 * * *"
  workflow_dispatch: {} # allows manual "Run workflow" from the Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Dump database
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase db dump --file snapcmd.sql
          gzip snapcmd.sql

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STAMP=$(date -u +%Y-%m-%dT%H-%M-%SZ)
          aws s3 cp snapcmd.sql.gz \
            "s3://${{ secrets.R2_BUCKET }}/snapcmd-backups/${STAMP}.sql.gz" \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
